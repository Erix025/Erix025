<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-labelledby="title desc">
  <title id="title">GitHub stats placeholder</title>
  <desc id="desc">A placeholder card shown until the GitHub Actions workflow generates the latest stats.</desc>
  <rect width="495" height="195" rx="12" fill="#1A1B27"/>
  <rect x="1" y="1" width="493" height="193" rx="11" fill="none" stroke="#2F334D"/>
  <text x="28" y="52" fill="#70A5FD" font-family="Arial, sans-serif" font-size="22" font-weight="700">GitHub Stats</text>
  <text x="28" y="96" fill="#C0CAF5" font-family="Arial, sans-serif" font-size="16">Cards are generated by GitHub Actions.</text>
  <text x="28" y="124" fill="#9AA5CE" font-family="Arial, sans-serif" font-size="14">Push this change or run the workflow once to refresh.</text>
</svg>
